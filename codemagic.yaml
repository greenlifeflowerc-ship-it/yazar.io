workflows:
  ios-adhoc:
    name: "YAZAR.IO iOS Ad Hoc IPA"
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: YAZAR_IO_APPLE_KEY

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - "codemagic.yaml"
        certificates:
          - "yazar"

    scripts:
      - name: Clean and regenerate Flutter iOS config
        script: |
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          flutter clean
          flutter pub get
          flutter precache --ios
          flutter build ios --config-only --release

          FLUTTER_ROOT_PATH="$(dirname "$(dirname "$(which flutter)")")"
          mkdir -p ios/Flutter
          touch ios/Flutter/Generated.xcconfig

          if ! grep -q "^FLUTTER_ROOT=" ios/Flutter/Generated.xcconfig; then
            echo "FLUTTER_ROOT=$FLUTTER_ROOT_PATH" >> ios/Flutter/Generated.xcconfig
          fi

          echo "Generated.xcconfig content:"
          cat ios/Flutter/Generated.xcconfig

      - name: Install CocoaPods
        script: |
          cd ios
          pod deintegrate || true
          pod install --repo-update
          cd ..

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Analyze Flutter project
        script: |
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Ad Hoc IPA
        script: |
          FLUTTER_ROOT_PATH="$(dirname "$(dirname "$(which flutter)")")"

          if ! grep -q "^FLUTTER_ROOT=" ios/Flutter/Generated.xcconfig; then
            echo "FLUTTER_ROOT=$FLUTTER_ROOT_PATH" >> ios/Flutter/Generated.xcconfig
          fi

          flutter build ipa --release --no-pub \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
