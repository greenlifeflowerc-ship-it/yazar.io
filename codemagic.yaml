workflows:
  ios-adhoc:
    name: "YAZAR.IO iOS Ad Hoc IPA"
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: YAZAR_IO_APPLE_KEY

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - "codemagic.yaml"
        certificates:
          - "yazar"

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Force Flutter iOS Generated.xcconfig
        script: |
          FLUTTER_ROOT_PATH="$(cd "$(dirname "$(command -v flutter)")/.." && pwd)"
          APP_PATH="${CM_BUILD_DIR:-$PWD}"
          BUILD_NUMBER="${PROJECT_BUILD_NUMBER:-1}"

          mkdir -p ios/Flutter

          cat > ios/Flutter/Generated.xcconfig <<EOF
FLUTTER_ROOT=$FLUTTER_ROOT_PATH
FLUTTER_APPLICATION_PATH=$APP_PATH
COCOAPODS_PARALLEL_CODE_SIGN=true
FLUTTER_TARGET=lib/main.dart
FLUTTER_BUILD_DIR=build
FLUTTER_BUILD_NAME=1.0.0
FLUTTER_BUILD_NUMBER=$BUILD_NUMBER
DART_OBFUSCATION=false
TRACK_WIDGET_CREATION=false
TREE_SHAKE_ICONS=true
PACKAGE_CONFIG=.dart_tool/package_config.json
EOF

          cat > ios/Flutter/flutter_export_environment.sh <<EOF
#!/bin/sh
export FLUTTER_ROOT="$FLUTTER_ROOT_PATH"
export FLUTTER_APPLICATION_PATH="$APP_PATH"
export COCOAPODS_PARALLEL_CODE_SIGN=true
export FLUTTER_TARGET="lib/main.dart"
export FLUTTER_BUILD_DIR="build"
export FLUTTER_BUILD_NAME="1.0.0"
export FLUTTER_BUILD_NUMBER="$BUILD_NUMBER"
export DART_OBFUSCATION=false
export TRACK_WIDGET_CREATION=false
export TREE_SHAKE_ICONS=true
export PACKAGE_CONFIG=".dart_tool/package_config.json"
EOF

          chmod +x ios/Flutter/flutter_export_environment.sh

          echo "Generated.xcconfig:"
          cat ios/Flutter/Generated.xcconfig

      - name: Install CocoaPods
        script: |
          cd ios
          pod deintegrate || true
          pod install --repo-update
          cd ..

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Analyze Flutter project
        script: |
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Ad Hoc IPA
        script: |
          FLUTTER_ROOT_PATH="$(cd "$(dirname "$(command -v flutter)")/.." && pwd)"
          APP_PATH="${CM_BUILD_DIR:-$PWD}"
          BUILD_NUMBER="${PROJECT_BUILD_NUMBER:-1}"

          mkdir -p ios/Flutter

          cat > ios/Flutter/Generated.xcconfig <<EOF
FLUTTER_ROOT=$FLUTTER_ROOT_PATH
FLUTTER_APPLICATION_PATH=$APP_PATH
COCOAPODS_PARALLEL_CODE_SIGN=true
FLUTTER_TARGET=lib/main.dart
FLUTTER_BUILD_DIR=build
FLUTTER_BUILD_NAME=1.0.0
FLUTTER_BUILD_NUMBER=$BUILD_NUMBER
DART_OBFUSCATION=false
TRACK_WIDGET_CREATION=false
TREE_SHAKE_ICONS=true
PACKAGE_CONFIG=.dart_tool/package_config.json
EOF

          flutter build ipa --release --no-pub \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
